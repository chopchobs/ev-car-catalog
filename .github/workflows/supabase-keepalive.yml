name: Supabase Keepalive

on:
  schedule:
    # รันทุก 3 วัน เวลา 08:00 น. ไทย (01:00 UTC) กัน Supabase free tier auto-pause (7 วันไม่มี activity)
    - cron: "0 1 */3 * *"
  workflow_dispatch: {} # กดรันเองจากหน้า Actions ได้

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping databases
        env:
          DB_URLS: |
            ${{ secrets.SUPABASE_DB_URL_EV }}
            ${{ secrets.SUPABASE_DB_URL_ECOM }}
        run: |
          ok=0; fail=0
          while IFS= read -r url; do
            [ -z "$url" ] && continue
            if psql "$url" -c "SELECT 1;" > /dev/null 2>&1; then
              echo "✅ ping success"
              ok=$((ok+1))
            else
              echo "❌ ping FAILED"
              fail=$((fail+1))
            fi
          done <<< "$DB_URLS"
          echo "done: $ok ok, $fail failed"
          [ "$fail" -eq 0 ] || exit 1
